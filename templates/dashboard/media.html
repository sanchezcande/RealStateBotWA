{% extends "base.html" %}
{% block title %}PropBot — Media Studio{% endblock %}

{% block head %}
<style>
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .photo-card {
    position: relative; border-radius: 10px; overflow: hidden;
    background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    aspect-ratio: 4/3; cursor: pointer;
  }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; }
  .photo-card.selected { outline: 3px solid #D97706; outline-offset: -3px; }
  .photo-card .check {
    position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
    background: #D97706; border-radius: 50%; display: none;
    align-items: center; justify-content: center; color: #fff; font-size: 14px;
  }
  .photo-card.selected .check { display: flex; }
  .photo-card .delete-btn {
    position: absolute; top: 8px; left: 8px; width: 24px; height: 24px;
    background: rgba(0,0,0,.5); border-radius: 50%; border: none;
    color: #fff; font-size: 14px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
  }
  .photo-card:hover .delete-btn { display: flex; }

  .upload-zone {
    border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px 20px;
    text-align: center; color: #888; cursor: pointer; transition: all .2s;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: #D97706; background: #fff7ed; color: #D97706; }
  .upload-zone input { display: none; }

  .gen-panel {
    background: #fff; border-radius: 12px; padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-top: 20px;
  }
  .gen-panel h3 { font-size: .95rem; font-weight: 700; margin-bottom: 12px; }
  .gen-panel textarea {
    width: 100%; padding: 10px 14px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: .85rem; resize: vertical; min-height: 60px;
  }
  .gen-panel textarea:focus { border-color: #D97706; outline: none; }
  .gen-panel input[type="text"] {
    width: 100%; padding: 8px 14px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: .85rem; margin-bottom: 12px;
  }

  .job-card {
    background: #fff; border-radius: 10px; padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 10px;
  }
  .job-card .job-type { font-size: .72rem; text-transform: uppercase; color: #888; font-weight: 700; }
  .job-card .job-status { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid #e5e7eb;
    border-top-color: #D97706; border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-video {
    width: 100%; max-width: 640px; border-radius: 10px;
    margin-top: 12px; background: #000;
  }
  .result-image {
    max-width: 400px; border-radius: 10px; margin-top: 12px;
  }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tabs button {
    padding: 8px 20px; border: none; background: #e5e7eb; border-radius: 8px;
    font-size: .85rem; font-weight: 600; cursor: pointer; color: #555;
  }
  .tabs button.active { background: #D97706; color: #fff; }
  .format-toggle {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
  }
  .format-toggle button {
    border: 1px solid #d1d5db; background: #fff; color: #555;
    border-radius: 999px; padding: 8px 14px; font-size: .8rem; font-weight: 600;
    cursor: pointer;
  }
  .format-toggle button.active {
    background: #111827; color: #fff; border-color: #111827;
  }
</style>
{% endblock %}

{% block content %}
<div x-data="mediaStudio()" x-init="init()">
  <div class="page-header">
    <div>
      <h1 data-i18n="media_studio">Media Studio</h1>
      <span class="page-subtitle" data-i18n="media_subtitle">Genera videos con IA para tus propiedades</span>
    </div>
  </div>

  <!-- Usage banner -->
  <template x-if="usage">
    <div style="background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div style="display:flex;align-items:center;gap:16px">
        <div>
          <span style="font-size:.82rem;color:#888" x-text="t('videos_this_month')"></span>
          <strong style="font-size:1.1rem;margin-left:6px" x-text="usage.videos_used + '/' + usage.total_allowed"></strong>
        </div>
        <div style="width:120px;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">
          <div style="height:100%;border-radius:4px;transition:width .3s"
               :style="'width:' + Math.min(usage.videos_used / usage.total_allowed * 100, 100) + '%;background:' + (usage.remaining <= 0 ? '#dc2626' : usage.remaining <= 1 ? '#f59e0b' : '#10b981')"></div>
        </div>
        <span style="font-size:.78rem;color:#888" x-text="usage.remaining + ' ' + t('remaining')"></span>
      </div>
      <button class="btn btn-outline" style="font-size:.78rem" @click="showPurchase = !showPurchase" x-text="t('buy_videos')"></button>
    </div>
  </template>

  <!-- Purchase modal -->
  <template x-if="showPurchase">
    <div style="background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.1);border:1px solid #e5e7eb">
      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:8px" x-text="t('buy_additional')"></h3>

      <!-- ARS (MercadoPago) -->
      <template x-if="purchaseCurrency === 'ARS'">
        <div>
          <p style="font-size:.82rem;color:#666;margin-bottom:12px">
            <span x-text="t('each_video_costs')"></span> <strong>$<span x-text="(usage.extra_video_price_ars || 0).toLocaleString('es-AR')"></span> ARS</strong>.
            <span x-text="t('added_to_limit')"></span>
          </p>
          <div style="display:flex;gap:10px;align-items:center">
            <label style="font-size:.82rem" x-text="t('quantity')"></label>
            <select x-model.number="purchaseCount" style="padding:6px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:.85rem">
              <option value="1" x-text="'1 ' + t('video_word') + ' — $' + (usage.extra_video_price_ars || 0).toLocaleString('es-AR')"></option>
              <option value="2" x-text="'2 ' + t('videos_word') + ' — $' + (usage.extra_video_price_ars * 2).toLocaleString('es-AR')"></option>
              <option value="5" x-text="'5 ' + t('videos_word') + ' — $' + (usage.extra_video_price_ars * 5).toLocaleString('es-AR')"></option>
              <option value="10" x-text="'10 ' + t('videos_word') + ' — $' + (usage.extra_video_price_ars * 10).toLocaleString('es-AR')"></option>
            </select>
            <span style="font-size:.9rem;font-weight:700;color:#D97706" x-text="'Total $' + (purchaseCount * (usage.extra_video_price_ars || 0)).toLocaleString('es-AR') + ' ARS'"></span>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px">
            <button class="btn btn-primary" @click="purchaseVideos()" x-text="t('confirm_purchase')"></button>
            <button class="btn btn-outline" @click="showPurchase = false" x-text="t('cancel')"></button>
          </div>
        </div>
      </template>

      <!-- USD option -->
      <template x-if="purchaseCurrency === 'USD'">
        <div>
          <p style="font-size:.82rem;color:#666;margin-bottom:12px">
            <span x-text="t('each_video_costs')"></span> <strong>USD <span x-text="usage.extra_video_price_usd"></span></strong>.
            <span x-text="t('added_to_limit')"></span>
          </p>
          <div style="display:flex;gap:10px;align-items:center">
            <label style="font-size:.82rem" x-text="t('quantity')"></label>
            <select x-model.number="purchaseCount" style="padding:6px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:.85rem">
              <option value="1" x-text="'1 ' + t('video_word') + ' — USD ' + usage.extra_video_price_usd"></option>
              <option value="2" x-text="'2 ' + t('videos_word') + ' — USD ' + (usage.extra_video_price_usd * 2)"></option>
              <option value="5" x-text="'5 ' + t('videos_word') + ' — USD ' + (usage.extra_video_price_usd * 5)"></option>
              <option value="10" x-text="'10 ' + t('videos_word') + ' — USD ' + (usage.extra_video_price_usd * 10)"></option>
            </select>
            <span style="font-size:.9rem;font-weight:700;color:#D97706" x-text="'Total USD ' + (purchaseCount * usage.extra_video_price_usd)"></span>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px">
            <button class="btn btn-primary" @click="purchaseVideos()" x-text="t('confirm_purchase')"></button>
            <button class="btn btn-outline" @click="showPurchase = false" x-text="t('cancel')"></button>
          </div>
        </div>
      </template>

      <template x-if="purchaseMsg">
        <p style="font-size:.82rem;color:#10b981;margin-top:8px" x-text="purchaseMsg"></p>
      </template>

      <!-- Embedded checkout iframe -->
      <template x-if="checkoutUrl">
        <div style="margin-top:16px;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb">
            <span style="font-size:.82rem;font-weight:600;color:#333">Completar pago</span>
            <button @click="checkoutUrl = ''" style="font-size:.78rem;color:#666;cursor:pointer;border:none;background:none">Cerrar</button>
          </div>
          <iframe :src="checkoutUrl" style="width:100%;height:600px;border:none"></iframe>
        </div>
      </template>
    </div>
  </template>

  <!-- Tabs -->
  <div class="tabs">
    <button :class="{ active: tab === 'jobs' }" @click="tab = tab === 'jobs' ? 'video' : 'jobs'; if(tab === 'jobs') loadJobs()" x-text="tab === 'jobs' ? '← ' + t('generate_video') : t('history')"></button>
  </div>

  <!-- ======================== VIDEO TOUR TAB ======================== -->
  <template x-if="tab === 'video'">
    <div>
      <!-- Upload zone -->
      <div class="upload-zone" id="dropZone"
           @dragover.prevent="$el.classList.add('dragover')"
           @dragleave="$el.classList.remove('dragover')"
           @drop.prevent="handleDrop($event)"
           @click="$refs.fileInput.click()">
        <svg style="width:48px;height:48px;margin:0 auto 12px;display:block;opacity:.4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p style="font-size:.9rem;font-weight:600" x-text="t('drag_photos')"></p>
        <p style="font-size:.78rem;margin-top:4px" x-text="t('file_types')"></p>
        <input type="file" x-ref="fileInput" accept="image/jpeg,image/png,image/webp"
               multiple @change="handleFiles($event)">
      </div>

      <!-- Photo grid -->
      <template x-if="photos.length > 0">
        <div style="margin-top:20px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h3 style="font-size:.95rem;font-weight:700"><span x-text="t('uploaded_photos')"></span>
              <span style="color:#888;font-weight:400" x-text="'(' + selectedIds.length + ' ' + t('selected') + ')'"></span>
            </h3>
            <button class="btn btn-outline" style="font-size:.78rem" @click="selectAll()">
              <span x-text="selectedIds.length === filteredPhotos.length ? t('deselect_all') : t('select_all')"></span>
            </button>
          </div>
          <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select x-model="filterProperty" style="padding:6px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:.82rem">
              <option value="">Todas las propiedades</option>
              <template x-for="prop in uniqueProperties" :key="prop">
                <option :value="prop" x-text="prop"></option>
              </template>
            </select>
          </div>
          <div class="media-grid">
            <template x-for="p in filteredPhotos" :key="p.id">
              <div class="photo-card" :class="{ selected: selectedIds.includes(p.id) }"
                   @click="toggleSelect(p.id)">
                <img :src="p.url" :alt="p.filename" loading="lazy">
                <div class="check">&#10003;</div>
                <button class="delete-btn" @click.stop="deletePhoto(p.id)" :title="t('delete')">&times;</button>
                <div x-show="p.property" style="position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:rgba(0,0,0,.6);color:#fff;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" x-text="p.property"></div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Generate panel -->
      <template x-if="selectedIds.length > 0">
        <div class="gen-panel">
          <h3 x-text="t('generate_video_tour')"></h3>
          <p style="font-size:.82rem;color:#666;margin-bottom:12px">
            <template x-if="selectedIds.length === 1">
              <span x-text="t('single_photo_desc')"></span>
            </template>
            <template x-if="selectedIds.length > 1 && selectedIds.length <= 10">
              <span x-text="t('multi_photo_desc', {count: selectedIds.length, secs: selectedIds.length * 5})"></span>
            </template>
            <template x-if="selectedIds.length > 10">
              <span x-text="t('multi_photo_capped', {count: selectedIds.length})"></span>
            </template>
          </p>
          <!-- Property name (appears as text overlay on video) -->
          <div style="margin-bottom:14px">
            <div style="font-size:.82rem;font-weight:600;color:#444;margin-bottom:4px">Nombre de la propiedad</div>
            <input type="text" placeholder="Ej: Depto 2 amb - Palermo" x-model="videoProperty">
            <div style="font-size:.78rem;color:#999;margin-top:2px">Aparece como texto en el video</div>
          </div>

          <!-- Video template presets -->
          <div style="margin-bottom:14px">
            <div style="font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px">Estilo del video</div>
            <div class="format-toggle">
              <button type="button" :class="{ active: videoTemplate === '' }" @click="applyTemplate('')">Personalizado</button>
              <button type="button" :class="{ active: videoTemplate === 'luxury' }" @click="applyTemplate('luxury')">Luxury</button>
              <button type="button" :class="{ active: videoTemplate === 'modern' }" @click="applyTemplate('modern')">Moderno</button>
              <button type="button" :class="{ active: videoTemplate === 'family' }" @click="applyTemplate('family')">Familiar</button>
              <button type="button" :class="{ active: videoTemplate === 'investment' }" @click="applyTemplate('investment')">Inversión</button>
            </div>
            <div style="font-size:.78rem;color:#999;margin-top:4px" x-show="videoTemplate">Prompt pre-configurado para este estilo. Podés editarlo abajo.</div>
          </div>

          <!-- Video prompt (instructions for Gemini AI) -->
          <div style="margin-bottom:14px">
            <div style="font-size:.82rem;font-weight:600;color:#444;margin-bottom:4px">Instrucciones para el video (prompt IA)</div>
            <textarea placeholder="Ej: Movimiento de camara lento, mostrar la luz natural, enfocarse en los detalles del living..."
                      x-model="videoPrompt" style="min-height:50px"></textarea>
            <div style="font-size:.78rem;color:#999;margin-top:2px">Opcional. Le dice a la IA como generar el video. Si lo dejas vacio, usa un prompt profesional por defecto.</div>
          </div>

          <!-- Video format -->
          <div style="margin-bottom:14px">
            <div style="font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px" x-text="t('video_format')"></div>
            <div class="format-toggle">
              <button type="button"
                      :class="{ active: videoFormat === 'vertical' }"
                      @click="videoFormat = 'vertical'"
                      x-text="t('format_vertical')"></button>
              <button type="button"
                      :class="{ active: videoFormat === 'horizontal' }"
                      @click="videoFormat = 'horizontal'"
                      x-text="t('format_horizontal')"></button>
            </div>
            <div style="font-size:.78rem;color:#666;margin-top:6px" x-text="t('video_format_help')"></div>
          </div>

          <!-- Voiceover section (disabled — AI voices sound robotic, revisit when quality improves)
          <div style="margin-bottom:14px;padding:16px;background:#f9fafb;border-radius:10px;border:1px solid #e5e7eb">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="font-size:.88rem;font-weight:700;color:#333">Voz en off</div>
              <span style="font-size:.7rem;background:#10b981;color:#fff;padding:2px 8px;border-radius:99px;font-weight:600">GRATIS</span>
            </div>
            <textarea placeholder="Escribi el texto que queres que se escuche. Ej: Hermoso departamento de 2 ambientes, luminoso, con balcon..."
                      x-model="voiceoverText" style="min-height:70px"></textarea>
            <div style="font-size:.78rem;color:#999;margin-top:4px">Si lo dejas vacio, el video no tiene voz. Cuanto mas texto, mas largo el audio.</div>

            <template x-if="voiceoverText.trim().length > 0">
              <div style="margin-top:10px">
                <div style="font-size:.82rem;font-weight:600;color:#444;margin-bottom:6px">Elegir voz</div>
                <div class="format-toggle">
                  <template x-for="v in availableVoices" :key="v.id">
                    <button type="button" :class="{ active: voice === v.id }" @click="voice = v.id" x-text="v.label"></button>
                  </template>
                </div>
                <template x-if="detectedLang === 'en'">
                  <div style="font-size:.78rem;color:#2563eb;margin-top:6px">English detected — showing English voices</div>
                </template>
              </div>
            </template>
          </div>
          -->

          <!-- Image quality -->
          <div style="margin-bottom:14px;padding:12px 16px;background:#f9fafb;border-radius:10px;border:1px solid #e5e7eb">
            <div style="display:flex;align-items:center;gap:8px">
              <input type="checkbox" id="enhancePhotos" x-model="enhancePhotos" style="width:16px;height:16px;accent-color:#D97706">
              <label for="enhancePhotos" style="font-size:.85rem;font-weight:600;color:#333;cursor:pointer">Mejorar calidad de fotos</label>
            </div>
            <div style="font-size:.78rem;color:#999;margin-top:4px;margin-left:24px">Mejora nitidez y contraste automaticamente antes de generar el video</div>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <button class="btn btn-primary" @click="generateVideo()" :disabled="generating || (usage && usage.remaining <= 0)">
              <span x-show="!generating" x-text="t('generate_video')"></span>
              <span x-show="generating" x-text="t('generating')"></span>
            </button>
            <span x-show="generating" class="spinner"></span>
            <span x-show="generating" style="font-size:.82rem;color:#666" x-text="genProgress"></span>
            <template x-if="usage && usage.remaining <= 0 && !generating">
              <span style="font-size:.82rem;color:#dc2626"><span x-text="t('no_videos_available')"></span> <a href="#" @click.prevent="showPurchase = true" style="color:#D97706;text-decoration:underline" x-text="t('buy_more')"></a></span>
            </template>
          </div>
          <template x-if="genError">
            <p style="color:#dc2626;font-size:.82rem;margin-top:8px" x-text="genError"></p>
          </template>
          <template x-if="genResult">
            <div style="margin-top:16px">
              <p style="font-size:.85rem;font-weight:600;color:#10b981;margin-bottom:8px" x-text="t('video_generated')"></p>
              <video class="result-video" :src="genResult" controls></video>
              <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
                <a class="btn btn-outline" :href="genResult" download x-text="t('download_video')"></a>
                <button class="btn btn-outline" @click="shareMedia(genResult, 'video', videoProperty)" style="font-size:.78rem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                  Enviar a WhatsApp
                </button>
                <button class="btn btn-outline" @click="copyLink(genResult)" style="font-size:.78rem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                  Copiar link
                </button>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- ======================== JOBS HISTORY TAB ======================== -->
  <template x-if="tab === 'jobs'">
    <div>
      <template x-if="jobs.length === 0">
        <div class="card"><p class="no-data" x-text="t('no_generations')"></p></div>
      </template>
      <template x-for="j in jobs" :key="j.id">
        <div class="job-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="job-type" x-text="j.type === 'video_tour' ? t('video_tour') : t('image')"></div>
              <div style="font-weight:600;font-size:.9rem;margin-top:2px" x-text="j.property || t('no_name')"></div>
            </div>
            <span class="badge" :class="{
              'badge-yellow': j.status === 'queued' || j.status === 'processing',
              'badge-green': j.status === 'completed',
              'badge-red': j.status === 'error'
            }" x-text="j.status === 'queued' ? t('queued') : j.status === 'processing' ? t('processing') : j.status === 'completed' ? t('completed_status') : t('error')"></span>
          </div>
          <div class="job-status" x-show="j.status === 'processing' || j.status === 'queued'">
            <span class="spinner"></span>
            <span style="font-size:.82rem;color:#666" x-text="j.progress"></span>
          </div>
          <template x-if="j.status === 'error'">
            <p style="color:#dc2626;font-size:.82rem;margin-top:6px" x-text="j.error"></p>
          </template>
          <template x-if="j.status === 'completed' && j.result_url">
            <div style="margin-top:8px">
              <template x-if="j.type === 'video_tour'">
                <div>
                  <video class="result-video" :src="j.result_url" controls style="max-width:480px"></video>
                  <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                    <a class="btn btn-outline" style="font-size:.78rem" :href="j.result_url" download x-text="t('download')"></a>
                    <button class="btn btn-outline" style="font-size:.78rem" @click="shareMedia(j.result_url, j.type, j.property)">Enviar a WA</button>
                    <button class="btn btn-outline" style="font-size:.78rem" @click="copyLink(j.result_url)">Copiar link</button>
                  </div>
                </div>
              </template>
              <template x-if="j.type === 'image'">
                <div>
                  <img class="result-image" :src="j.result_url" style="max-width:300px">
                  <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
                    <a class="btn btn-outline" style="font-size:.78rem" :href="j.result_url" download x-text="t('download')"></a>
                    <button class="btn btn-outline" style="font-size:.78rem" @click="shareMedia(j.result_url, j.type, j.property)">Enviar a WA</button>
                    <button class="btn btn-outline" style="font-size:.78rem" @click="copyLink(j.result_url)">Copiar link</button>
                  </div>
                </div>
              </template>
            </div>
          </template>
          <div style="font-size:.7rem;color:#aaa;margin-top:6px" x-text="j.created_at"></div>
        </div>
      </template>
    </div>
  </template>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js?v={{ v }}"></script>
<script>
function mediaStudio() {
  return {
    tab: "video",
    photos: [],
    selectedIds: [],
    filterProperty: "",
    // Video gen
    voiceoverText: "", videoPrompt: "", videoProperty: "", videoFormat: "vertical", videoTemplate: "", voice: "es-AR-TomasNeural",
    enhancePhotos: true,
    detectedLang: "es",
    _esVoices: [
      { id: "es-AR-TomasNeural", label: "Tomas (AR masc.)" },
      { id: "es-AR-ElenaNeural", label: "Elena (AR fem.)" },
      { id: "es-MX-DaliaNeural", label: "Dalia (MX fem.)" },
      { id: "es-ES-ElviraNeural", label: "Elvira (ES fem.)" },
      { id: "es-ES-AlvaroNeural", label: "Alvaro (ES masc.)" },
    ],
    _enVoices: [
      { id: "en-US-GuyNeural", label: "Guy (US masc.)" },
      { id: "en-US-JennyNeural", label: "Jenny (US fem.)" },
      { id: "en-GB-RyanNeural", label: "Ryan (UK masc.)" },
      { id: "en-GB-SoniaNeural", label: "Sonia (UK fem.)" },
    ],
    generating: false, genProgress: "", genError: "", genResult: "",
    // Jobs
    jobs: [],
    _pollTimer: null,
    // Usage & purchase
    usage: null,
    showPurchase: false,
    purchaseCount: 1,
    purchaseCurrency: (Intl.DateTimeFormat().resolvedOptions().timeZone || "").includes("Argentina") ? "ARS" : "USD",
    purchaseMsg: "",
    checkoutUrl: "",

    get availableVoices() {
      return this.detectedLang === "en" ? this._enVoices : this._esVoices;
    },
    get uniqueProperties() {
      const props = [...new Set(this.photos.map(p => p.property).filter(Boolean))];
      return props.sort();
    },
    get filteredPhotos() {
      if (!this.filterProperty) return this.photos;
      return this.photos.filter(p => p.property === this.filterProperty);
    },
    init() {
      this.loadPhotos(); this.loadUsage();
      this.$watch("voiceoverText", (val) => {
        const text = (val || "").trim().toLowerCase();
        const enWords = ["the", "apartment", "bedroom", "property", "located", "spacious", "beautiful", "with", "this", "features"];
        const enCount = enWords.filter(w => text.includes(w)).length;
        const newLang = enCount >= 2 ? "en" : "es";
        if (newLang !== this.detectedLang) {
          this.detectedLang = newLang;
          this.voice = newLang === "en" ? "en-US-GuyNeural" : "es-AR-TomasNeural";
        }
      });
    },

    loadUsage() {
      dashFetch("/api/dashboard/media/usage").then(d => { this.usage = d; });
    },

    purchaseVideos() {
      this.purchaseMsg = "";
      dashFetch("/api/dashboard/media/purchase", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ count: this.purchaseCount, currency: this.purchaseCurrency }),
      }).then(d => {
        if (d.error) { alert(d.error); return; }
        if (d.checkout_url) {
          this.checkoutUrl = d.checkout_url;
          return;
        }
        if (d.contact) {
          this.purchaseMsg = d.contact;
          return;
        }
        this.usage = d;
        this.purchaseMsg = t("videos_added", { count: this.purchaseCount, remaining: d.remaining });
        this.purchaseCount = 1;
      });
    },

    // ---- Photo management ----
    loadPhotos() {
      dashFetch("/api/dashboard/media/photos").then(d => { this.photos = d.photos || []; });
    },

    handleFiles(e) {
      this.uploadFiles(e.target.files);
      e.target.value = "";
    },

    handleDrop(e) {
      e.target.classList.remove("dragover");
      this.uploadFiles(e.dataTransfer.files);
    },

    uploadFiles(fileList) {
      const fd = new FormData();
      for (const f of fileList) fd.append("photos", f);
      fd.append("property", this.videoProperty);

      const token = new URLSearchParams(window.location.search).get("token") || "";
      fetch("/api/dashboard/media/upload?token=" + encodeURIComponent(token), {
        method: "POST", body: fd,
      }).then(r => r.json()).then(d => {
        if (d.error) { alert(d.error); return; }
        this.loadPhotos();
      });
    },

    toggleSelect(id) {
      const idx = this.selectedIds.indexOf(id);
      if (idx >= 0) this.selectedIds.splice(idx, 1);
      else this.selectedIds.push(id);
    },

    selectAll() {
      const visible = this.filteredPhotos;
      if (this.selectedIds.length === visible.length) this.selectedIds = [];
      else this.selectedIds = visible.map(p => p.id);
    },

    applyTemplate(template) {
      this.videoTemplate = template;
      const templates = {
        luxury: "Movimiento de cámara elegante y pausado. Enfocarse en detalles premium: mármol, madera noble, iluminación cálida, vistas panorámicas. Transmitir exclusividad y sofisticación. Estilo cinematográfico de revista de arquitectura.",
        modern: "Movimiento fluido y dinámico. Destacar líneas limpias, espacios abiertos, luz natural abundante. Estética minimalista y contemporánea. Transiciones suaves entre ambientes.",
        family: "Recorrido cálido y acogedor. Mostrar amplitud de espacios, áreas verdes, cocina amplia, dormitorios luminosos. Transmitir sensación de hogar y comodidad. Ritmo tranquilo.",
        investment: "Recorrido eficiente y profesional. Destacar metros cuadrados, distribución funcional, estado de conservación, potencial de renta. Enfoque informativo y directo.",
      };
      this.videoPrompt = templates[template] || "";
    },

    deletePhoto(id) {
      if (!confirm(t("delete_photo_confirm"))) return;
      const token = new URLSearchParams(window.location.search).get("token") || "";
      fetch(`/api/dashboard/media/photos/${id}?token=` + encodeURIComponent(token), {
        method: "DELETE",
      }).then(() => {
        this.selectedIds = this.selectedIds.filter(x => x !== id);
        this.loadPhotos();
      });
    },

    // ---- Video generation ----
    generateVideo() {
      this.generating = true;
      this.genError = "";
      this.genResult = "";
      this.genProgress = t("sending");

      dashFetch("/api/dashboard/media/generate/video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          photo_ids: this.selectedIds,
          prompt: this.videoPrompt.trim(),
          voiceover_text: this.voiceoverText.trim(),
          property: this.videoProperty,
          video_format: this.videoFormat,
          voice: this.voiceoverText.trim() ? this.voice : "",
          enhance: this.enhancePhotos,
        }),
      }).then(d => {
        if (d.usage) this.usage = d.usage;
        if (d.error) {
          this.genError = d.error;
          this.generating = false;
          if (d.limit_reached) this.showPurchase = true;
          return;
        }
        this._pollJob(d.job_id, "video");
      }).catch(e => { this.genError = t("network_error"); this.generating = false; });
    },

    // ---- Polling ----
    _pollJob(jobId, type) {
      const poll = () => {
        dashFetch(`/api/dashboard/media/jobs/${jobId}`).then(j => {
          if (type === "video") this.genProgress = j.progress || "";
          if (j.status === "completed") {
            this.genResult = j.result_url; this.generating = false;
          } else if (j.status === "error") {
            this.genError = j.error; this.generating = false;
          } else {
            setTimeout(poll, 3000);
          }
        });
      };
      setTimeout(poll, 2000);
    },

    // ---- Jobs history ----
    loadJobs() {
      dashFetch("/api/dashboard/media/jobs").then(d => { this.jobs = d.jobs || []; });
    },

    // ---- Share / Copy link ----
    shareMedia(url, type, caption) {
      const token = new URLSearchParams(window.location.search).get("token") || "";
      fetch(`/api/dashboard/media/share?token=${encodeURIComponent(token)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, type, caption: caption || "" }),
      }).then(r => r.json()).then(d => {
        if (d.ok) alert("Enviado a tu WhatsApp!");
        else alert(d.error || "Error al enviar");
      }).catch(() => alert("Error de red"));
    },

    copyLink(url) {
      const fullUrl = window.location.origin + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        alert("Link copiado al portapapeles!");
      }).catch(() => {
        // Fallback for older browsers
        prompt("Copia este link:", fullUrl);
      });
    },
  };
}

// Override dashFetch for POST support — parse JSON body even on error responses
const _origDashFetch = dashFetch;
dashFetch = function(url, opts) {
  const token = new URLSearchParams(window.location.search).get("token") || "";
  const sep = url.includes("?") ? "&" : "?";
  const fullUrl = url + sep + "token=" + encodeURIComponent(token);
  if (opts && opts.method && opts.method !== "GET") {
    return fetch(fullUrl, opts).then(r => r.json());
  }
  return _origDashFetch(url);
};
</script>
{% endblock %}
