{% extends "base.html" %}
{% block title %}Valentina — Leads{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Leads</h1>
</div>

<div x-data="leadsView()" x-init="load()">
  <div class="filters">
    <select x-model="filterOp" @change="page=1; load()">
      <option value="" x-text="t('all_operations')"></option>
      <option value="alquilar" x-text="t('rental')"></option>
      <option value="comprar" x-text="t('purchase')"></option>
    </select>
    <select x-model="sortBy" @change="page=1; load()">
      <option value="updated_at" x-text="t('most_recent')"></option>
      <option value="created_at" x-text="t('oldest')"></option>
      <option value="name" x-text="t('name')"></option>
    </select>
    {% if plan == 'premium' %}
    <a class="btn btn-outline" href="/dashboard/export.csv?token={{ token }}&days=90" data-i18n="export_csv">Exportar CSV</a>
    {% endif %}
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="name">Nombre</th>
            <th data-i18n="phone">Telefono</th>
            <th data-i18n="operation">Operacion</th>
            <th data-i18n="type">Tipo</th>
            <th data-i18n="budget">Presupuesto</th>
            <th data-i18n="timeline">Timeline</th>
            <th data-i18n="channel">Canal</th>
            <th data-i18n="msgs">Msgs</th>
            <th data-i18n="visits_th">Visitas</th>
            <th data-i18n="last_contact">Ultimo contacto</th>
          </tr>
        </thead>
        <tbody>
          <template x-if="items.length === 0">
            <tr><td colspan="10" class="no-data" x-text="t('no_leads')"></td></tr>
          </template>
          <template x-for="l in items" :key="l.phone_hash">
            <tr>
              <td x-text="l.name || '—'" style="font-weight:600"></td>
              <td x-text="l.phone" style="font-family:monospace;font-size:.78rem"></td>
              <td>
                <span x-show="l.operation === 'alquilar'" class="badge badge-blue" x-text="t('rental')"></span>
                <span x-show="l.operation === 'comprar'" class="badge badge-green" x-text="t('purchase')"></span>
                <span x-show="!l.operation">—</span>
              </td>
              <td x-text="l.property_type || '—'"></td>
              <td x-text="l.budget || '—'"></td>
              <td x-text="l.timeline || '—'"></td>
              <td><span class="badge badge-gray" x-text="l.channel"></span></td>
              <td x-text="l.message_count"></td>
              <td x-text="l.visit_count"></td>
              <td x-text="timeAgo(l.updated_at)" style="font-size:.78rem;color:#888"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div class="pagination" x-show="totalPages > 1">
      <a href="#" x-show="page > 1" @click.prevent="page--; load()" x-text="t('previous')"></a>
      <span class="current" x-text="page + ' / ' + totalPages"></span>
      <a href="#" x-show="page < totalPages" @click.prevent="page++; load()" x-text="t('next')"></a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js"></script>
<script>
function leadsView() {
  return {
    items: [], total: 0, page: 1, perPage: 20,
    filterOp: "", sortBy: "updated_at",

    get totalPages() { return Math.max(1, Math.ceil(this.total / this.perPage)); },

    load() {
      let url = `/api/dashboard/leads?page=${this.page}&per_page=${this.perPage}&sort=${this.sortBy}`;
      if (this.filterOp) url += `&operation=${this.filterOp}`;
      dashFetch(url).then(data => {
        this.items = data.items;
        this.total = data.total;
      });
    },
  };
}
</script>
{% endblock %}
